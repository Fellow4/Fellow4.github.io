name: Deploy website to GitHub Pages

env:
  WC_HUGO_VERSION: '0.126.3'

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: ${{ env.WC_HUGO_VERSION }}
        extended: true

    - uses: actions/cache@v4
      with:
        path: /tmp/hugo_cache_runner/
        key: ${{ runner.os }}-hugomod-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-hugomod-

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v4

    - name: Build with Hugo
      env:
        HUGO_ENVIRONMENT: production
      run: |
        echo "Hugo Cache Dir: $(hugo config | grep cachedir)"
        hugo --cleanDestinationDir --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

    - name: Remove .DS_Store files before upload
      run: find public -type f -name ".DS_Store" -delete

    - name: List public/ contents before upload
      run: |
        echo "=== public/ Directory Structure ==="
        ls -l
